<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Conta – FireWatch</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="fire-icon">🔥</span>
      <h1>Fire<span style="color:var(--primary)">Reports</span></h1>
      <p>Crie sua conta gratuitamente</p>
    </div>
    <div class="form-group">
      <label>Nome completo</label>
      <input type="text" id="name" placeholder="João da Silva">
    </div>
    <div class="form-group">
      <label>E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com">
    </div>
    <div class="form-group">
      <label>CPF</label>
      <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14">
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="password" placeholder="Mínimo 6 caracteres">
    </div>
    <div class="form-group">
      <label>Confirmar senha</label>
      <input type="password" id="password2" placeholder="Repita a senha">
    </div>
    <button class="btn btn-primary btn-full" id="registerBtn">Criar Conta</button>
    <div id="registerError" style="color:var(--danger);font-size:13px;text-align:center;margin-top:10px;display:none"></div>
    <div class="auth-links">
      <a href="login.html">Já tem conta? <strong>Entrar</strong></a>
      <a href="index.html">← Voltar ao mapa</a>
    </div>
  </div>
  <div id="toastContainer"></div>
  <script src="db.js"></script>
  <script src="auth.js"></script>
  <script>
    // Máscara CPF
    document.getElementById('cpf').addEventListener('input', function() {
      let v = this.value.replace(/\D/g, '').slice(0, 11);
      v = v.replace(/(\d{3})(\d)/, '$1.$2');
      v = v.replace(/(\d{3})(\d)/, '$1.$2');
      v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
      this.value = v;
    });

    function validarCPF(cpf) {
      cpf = cpf.replace(/\D/g, '');
      if (cpf.length !== 11 || /^(\d)\1{10}$/.test(cpf)) return false;
      let soma = 0, resto;
      for (let i = 1; i <= 9; i++) soma += parseInt(cpf[i-1]) * (11 - i);
      resto = (soma * 10) % 11;
      if (resto === 10 || resto === 11) resto = 0;
      if (resto !== parseInt(cpf[9])) return false;
      soma = 0;
      for (let i = 1; i <= 10; i++) soma += parseInt(cpf[i-1]) * (12 - i);
      resto = (soma * 10) % 11;
      if (resto === 10 || resto === 11) resto = 0;
      return resto === parseInt(cpf[10]);
    }

    function validarEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(email);
    }

    document.getElementById('registerBtn').addEventListener('click', async () => { // ← async corrigido
      const name      = document.getElementById('name').value.trim();
      const email     = document.getElementById('email').value.trim();
      const cpf       = document.getElementById('cpf').value.trim();
      const password  = document.getElementById('password').value;
      const password2 = document.getElementById('password2').value;
      const errEl     = document.getElementById('registerError');
      const btn       = document.getElementById('registerBtn');

      errEl.style.display = 'none';
      const showErr = msg => { errEl.textContent = msg; errEl.style.display = 'block'; };

      if (!name || !email || !cpf || !password || !password2) return showErr('Preencha todos os campos.');
      if (!validarEmail(email))   return showErr('E-mail inválido. Ex: nome@dominio.com');
      if (!validarCPF(cpf))       return showErr('CPF inválido. Verifique os dígitos.');
      if (password.length < 6)    return showErr('A senha deve ter ao menos 6 caracteres.');
      if (password !== password2) return showErr('As senhas não coincidem.');

      btn.textContent = '⏳ Criando conta…';
      btn.disabled    = true;

      const result = await DB.createUser({ name, email, cpf, password }); // ← await corrigido
      if (result.ok) {
        showToast('Conta criada com sucesso! 🎉', 'success');
        setTimeout(() => window.location.href = 'index.html', 1000);
      } else {
        showErr(result.msg);
        btn.textContent = 'Criar Conta';
        btn.disabled    = false;
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin - Monitoramento de Queimadas</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .admin-page { max-width: 860px; margin: 32px auto; padding: 0 20px 60px; }

    .admin-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 28px;
    }
    .admin-header h1 { font-size: 22px; font-weight: bold; }
    .admin-header span {
      font-size: 12px; background: #c62828; color: #fff;
      padding: 3px 10px; border-radius: 20px; font-weight: bold;
      letter-spacing: 0.5px; text-transform: uppercase;
    }

    /* Cards de resumo */
    .summary-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
      margin-bottom: 28px;
    }
    .summary-card {
      background: #fff; border-radius: 10px; padding: 16px 12px;
      text-align: center; border-top: 4px solid #ccc;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    body.dark-mode .summary-card { background: #1e1e1e; }
    .summary-card .s-num { font-size: 30px; font-weight: bold; }
    .summary-card .s-lbl { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
    .card-total  { border-color: #2e7d32; }
    .card-alto   { border-color: red; }
    .card-medio  { border-color: orange; }
    .card-baixo  { border-color: #ccb800; }

    /* Seção */
    .admin-section {
      background: #fff; border-radius: 10px; padding: 20px;
      margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    body.dark-mode .admin-section { background: #1e1e1e; }
    .admin-section h2 {
      font-size: 15px; font-weight: bold; margin-bottom: 14px;
      padding-bottom: 8px; border-bottom: 1px solid #eee; text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    body.dark-mode .admin-section h2 { border-color: #333; }

    /* Filtros */
    .filter-row { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
    .filter-row button {
      padding: 5px 14px; border-radius: 20px; border: 1px solid #ccc;
      background: transparent; font-size: 12px; cursor: pointer;
      transition: all .2s;
    }
    .filter-row button.active,
    .filter-row button:hover { background: #2e7d32; color: #fff; border-color: #2e7d32; }
    .filter-row button.f-alto.active  { background: red;    border-color: red; }
    .filter-row button.f-medio.active { background: orange; border-color: orange; color:#000; }
    .filter-row button.f-baixo.active { background: #ccb800;border-color: #ccb800; color:#000; }

    /* Tabela */
    .admin-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .admin-table th {
      text-align: left; padding: 8px 10px; font-size: 11px;
      text-transform: uppercase; letter-spacing: 0.5px; color: #888;
      border-bottom: 1px solid #eee;
    }
    body.dark-mode .admin-table th { border-color: #333; }
    .admin-table td { padding: 10px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
    body.dark-mode .admin-table td { border-color: #2a2a2a; }
    .admin-table tr:last-child td { border-bottom: none; }
    .admin-table tr:hover td { background: #f9f9f9; }
    body.dark-mode .admin-table tr:hover td { background: #242424; }

    .badge {
      font-size: 11px; font-weight: bold; padding: 2px 8px;
      border-radius: 4px; text-transform: uppercase; white-space: nowrap;
    }
    .badge-alto  { background: rgba(198,40,40,.12); color: #c62828; }
    .badge-medio { background: rgba(230,81,0,.12);  color: #e65100; }
    .badge-baixo { background: rgba(204,184,0,.12); color: #7a6e00; }

    .btn-del {
      background: none; border: 1px solid #c62828; color: #c62828;
      border-radius: 4px; padding: 3px 10px; font-size: 12px;
      cursor: pointer; transition: all .2s;
    }
    .btn-del:hover { background: #c62828; color: #fff; }

    /* Export */
    .btn-export {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; background: #2e7d32; color: #fff;
      border: none; border-radius: 6px; font-size: 13px;
      cursor: pointer; transition: background .2s; text-decoration: none;
    }
    .btn-export:hover { background: #1b5e20; }

    .empty { color: #888; font-size: 13px; text-align: center; padding: 20px; }
  </style>
</head>
<body>
<header>
  <a href="index.html" class="header-brand">
    <span class="logo-icon">🔥</span>
    <span class="logo-text">Fire<span>Reports</span></span>
  </a>
  <div class="header-right">
    <button id="themeToggle" class="btn-icon">🌙</button>
    <button id="menuToggle"  class="btn-icon">☰</button>
  </div>
</header>

<div class="menu-overlay" id="menuOverlay"></div>
<div id="sideMenu" class="side-menu">
  <div class="side-menu-header">
    <div class="side-menu-user" id="menuUserInfo"></div>
  </div>
  <nav>
    <a href="index.html">   <span class="nav-icon">🗺️</span> Mapa</a>
    <a href="profile.html"> <span class="nav-icon">👤</span> Meu Perfil</a>
    <a href="admin.html">   <span class="nav-icon">⚙️</span> Painel Admin</a>
    <a href="login.html" id="navLogin">        <span class="nav-icon">🔐</span> Login</a>
    <a href="create_account.html" id="navRegister"><span class="nav-icon">📝</span> Criar Conta</a>
  </nav>
  <div class="side-menu-footer">
    <button class="btn btn-danger btn-full" id="logoutBtn" style="display:none">⏏ Sair</button>
  </div>
</div>

  <div class="admin-page">

    <div class="admin-header">
      <h1>⚙️ Painel Administrativo</h1>
      <span>🔒 Admin</span>
    </div>

    <!-- RESUMO -->
    <div class="summary-grid">
      <div class="summary-card card-total">
        <div class="s-num" id="sTotal" style="color:#2e7d32">–</div>
        <div class="s-lbl">Total</div>
      </div>
      <div class="summary-card card-alto">
        <div class="s-num" id="sAlto" style="color:red">–</div>
        <div class="s-lbl">🔴 Alto</div>
      </div>
      <div class="summary-card card-medio">
        <div class="s-num" id="sMedio" style="color:orange">–</div>
        <div class="s-lbl">🟠 Médio</div>
      </div>
      <div class="summary-card card-baixo">
        <div class="s-num" id="sBaixo" style="color:#ccb800">–</div>
        <div class="s-lbl">🟡 Baixo</div>
      </div>
    </div>

    <!-- DENÚNCIAS -->
    <div class="admin-section">
      <h2>📋 Todas as Denúncias</h2>

      <div class="filter-row">
        <button class="active" data-f="all">Todos</button>
        <button class="f-alto"  data-f="3">🔴 Alto</button>
        <button class="f-medio" data-f="2">🟠 Médio</button>
        <button class="f-baixo" data-f="1">🟡 Baixo</button>
      </div>

      <div style="margin-bottom:12px">
        <button class="btn-export" id="btnExportCSV">⬇ Exportar CSV</button>
      </div>

      <div id="reportsTableWrap">
        <p class="empty">⏳ Carregando…</p>
      </div>
    </div>

    <!-- USUÁRIOS -->
    <div class="admin-section">
      <h2>👥 Usuários Cadastrados</h2>
      <div id="usersTableWrap">
        <p class="empty">⏳ Carregando…</p>
      </div>
    </div>

    <a href="index.html" class="btn btn-primary" style="display:inline-flex;margin-top:8px;">← Voltar ao mapa</a>
  </div>

  <div id="toastContainer"></div>
  <footer>© 2026 PROJETO ADS III | Desenvolvido por Filipe</footer>

  <script src="db.js"></script>
  <script src="auth.js"></script>
  <script>
    // Proteção: só admin acessa
    if (!DB.isAdmin()) { window.location.href = 'index.html'; }

    const levelLabel = { '1': 'Baixo', '2': 'Médio', '3': 'Alto' };
    const levelClass = { '1': 'badge-baixo', '2': 'badge-medio', '3': 'badge-alto' };

    let allReports = [];
    let activeFilter = 'all';

    // ── RENDERIZAR TABELA DE DENÚNCIAS ──────────────────────
    function renderReports(filter) {
      activeFilter = filter;
      const filtered = filter === 'all' ? allReports : allReports.filter(r => r.level === filter);
      const wrap = document.getElementById('reportsTableWrap');

      if (filtered.length === 0) {
        wrap.innerHTML = '<p class="empty">Nenhuma denúncia encontrada.</p>';
        return;
      }

      wrap.innerHTML = `
        <table class="admin-table">
          <thead>
            <tr>
              <th>Nível</th>
              <th>Local</th>
              <th>Descrição</th>
              <th>Por</th>
              <th>Coordenadas</th>
              <th>Data</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            ${filtered.map(r => `
              <tr id="row-${r.id}">
                <td><span class="badge ${levelClass[r.level]}">${levelLabel[r.level] || r.level}</span></td>
                <td>${r.category}</td>
                <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.info || '–'}</td>
                <td>${r.user_name || 'Anônimo'}</td>
                <td style="font-size:11px;color:#888">${Number(r.lat).toFixed(4)}, ${Number(r.lng).toFixed(4)}</td>
                <td style="white-space:nowrap">${new Date(r.created_at).toLocaleDateString('pt-BR')}</td>
                <td><button class="btn-del" onclick="deleteReport('${r.id}')">🗑 Excluir</button></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    // ── EXCLUIR DENÚNCIA ────────────────────────────────────
    async function deleteReport(id) {
      if (!confirm('Excluir esta denúncia permanentemente?')) return;
      const result = await DB.deleteReport(id);
      if (result.ok) {
        allReports = allReports.filter(r => r.id !== id);
        updateSummary();
        renderReports(activeFilter);
      } else {
        alert('Erro ao excluir: ' + result.msg);
      }
    }

    // ── RESUMO ───────────────────────────────────────────────
    function updateSummary() {
      document.getElementById('sTotal').textContent = allReports.length;
      document.getElementById('sAlto').textContent  = allReports.filter(r => r.level === '3').length;
      document.getElementById('sMedio').textContent = allReports.filter(r => r.level === '2').length;
      document.getElementById('sBaixo').textContent = allReports.filter(r => r.level === '1').length;
    }

    // ── FILTROS ──────────────────────────────────────────────
    document.querySelectorAll('.filter-row button').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.filter-row button').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        renderReports(this.dataset.f);
      });
    });

    // ── EXPORTAR CSV ─────────────────────────────────────────
    document.getElementById('btnExportCSV').addEventListener('click', () => {
      const rows = [['Nivel', 'Local', 'Descricao', 'Usuario', 'Lat', 'Lng', 'Data']];
      allReports.forEach(r => rows.push([
        levelLabel[r.level] || r.level,
        r.category, r.info || '',
        r.user_name || 'Anonimo',
        r.lat, r.lng,
        new Date(r.created_at).toLocaleDateString('pt-BR')
      ]));
      const csv  = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
      const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a'); a.href = url;
      a.download = `firewatch_denuncias_${new Date().toISOString().slice(0,10)}.csv`;
      a.click(); URL.revokeObjectURL(url);
    });

    // ── TABELA DE USUÁRIOS ───────────────────────────────────
    async function loadUsers() {
      const users = await DB.getAllUsers();
      const wrap  = document.getElementById('usersTableWrap');
      if (users.length === 0) { wrap.innerHTML = '<p class="empty">Nenhum usuário cadastrado.</p>'; return; }
      wrap.innerHTML = `
        <table class="admin-table">
          <thead>
            <tr><th>#</th><th>Nome</th><th>E-mail</th><th>Cadastrado em</th></tr>
          </thead>
          <tbody>
            ${users.map((u, i) => `
              <tr>
                <td style="color:#888;font-size:12px">${i + 1}</td>
                <td>${u.name}</td>
                <td style="color:#888">${u.email}</td>
                <td style="font-size:12px;color:#888">${new Date(u.created_at).toLocaleDateString('pt-BR')}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    // ── INICIALIZAR ──────────────────────────────────────────
    async function init() {
      allReports = await DB.getReports();
      updateSummary();
      renderReports('all');
      loadUsers();
    }

    init();
  </script>
</body>
</html>

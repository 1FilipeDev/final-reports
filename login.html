<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – FireWatch</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="fire-icon">🔥</span>
      <h1>Fire<span style="color:var(--primary)">Reports</span></h1>
      <p>Monitoramento Inteligente de Queimadas</p>
    </div>
    <div class="form-group">
      <label>E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn btn-primary btn-full" id="loginBtn">Entrar</button>
    <div id="loginError" style="color:var(--danger);font-size:13px;text-align:center;margin-top:10px;display:none"></div>
    <div class="auth-links">
      <a href="create_account.html">Não tem conta? <strong>Cadastre-se</strong></a>
      <a href="forgot_password.html">Esqueceu a senha?</a>
      <div class="auth-divider">ou</div>
      <a href="index.html">← Voltar ao mapa</a>
    </div>
  </div>
  <div id="toastContainer"></div>
  <script src="db.js"></script>
  <script src="auth.js"></script>
  <script>
    if (DB.getSession()) window.location.href = 'index.html';

    async function doLogin() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errEl    = document.getElementById('loginError');
      const btn      = document.getElementById('loginBtn');

      errEl.style.display = 'none';

      if (!email || !password) {
        errEl.textContent = 'Preencha todos os campos.';
        errEl.style.display = 'block';
        return;
      }

      btn.textContent = '⏳ Entrando…';
      btn.disabled    = true;

      const result = await DB.loginUser(email, password); // ← await corrigido
      if (result.ok) {
        showToast('Bem-vindo, ' + result.user.name + '! 👋', 'success');
        setTimeout(() => window.location.href = 'index.html', 900);
      } else {
        errEl.textContent = result.msg;
        errEl.style.display = 'block';
        btn.textContent  = 'Entrar';
        btn.disabled     = false;
      }
    }

    document.getElementById('loginBtn').addEventListener('click', doLogin);
    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Senha – FireWatch</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="fire-icon">🔥</span>
      <h1>Fire<span style="color:var(--primary)">Watch</span></h1>
      <p>Recuperação de senha</p>
    </div>
    <p style="font-size:13px;color:var(--text2);text-align:center;margin-bottom:20px;line-height:1.6">
      Digite o e-mail cadastrado e simularemos o envio de um link de recuperação.
    </p>
    <div class="form-group">
      <label>E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com">
    </div>
    <button class="btn btn-primary btn-full" id="sendBtn">Enviar link de recuperação</button>
    <div id="msg" style="font-size:13px;text-align:center;margin-top:12px;min-height:20px;"></div>
    <div class="auth-links">
      <a href="login.html">← Voltar ao login</a>
    </div>
  </div>
  <div id="toastContainer"></div>
  <script src="db.js"></script>
  <script src="auth.js"></script>
  <script>
    document.getElementById('sendBtn').addEventListener('click', () => {
      const email = document.getElementById('email').value.trim();
      const msgEl = document.getElementById('msg');
      if (!email) {
        msgEl.style.color = 'var(--danger)';
        msgEl.textContent = 'Informe seu e-mail.';
        return;
      }
      // Resposta sempre positiva — não revela se e-mail existe (boa prática de segurança)
      msgEl.style.color = 'var(--success)';
      msgEl.textContent = '✅ Se o e-mail estiver cadastrado, você receberá as instruções em breve.';
    });
  </script>
</body>
</html>
